<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>სანაპირო — ცოცხალი პლაჟის რუკა</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Noto+Sans+Georgian:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --deep-sea:#081d27; --deep-sea-2:#0f3a4d;
    --sand:#f3e6c9; --sand-dim:#a9b8bd;
    --coral:#ff6b4a; --seafoam:#4fd1a5; --amber:#ffb648;
    --ink:#0b1c22; --panel:#0e2b38f0; --line:rgba(243,230,201,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:'Noto Sans Georgian','Inter',sans-serif;background:var(--deep-sea);color:var(--sand);overflow:hidden;}
  #map{position:absolute;inset:0;}
  #map .leaflet-tile-pane{filter:hue-rotate(-6deg) brightness(0.8) contrast(1.08) saturate(0.85);}

  .topbar{
    position:absolute;top:0;left:0;right:0;z-index:900;
    padding:18px 22px 30px;
    background:linear-gradient(180deg, rgba(8,29,39,0.95) 0%, rgba(8,29,39,0.5) 65%, rgba(8,29,39,0) 100%);
    pointer-events:none; display:flex; justify-content:space-between; align-items:flex-start;
  }
  .topbar *{pointer-events:auto;}
  .titleblock{max-width:78%;}
  .eyebrow{
    font-size:11px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--seafoam); font-weight:600; margin:0 0 4px;
    display:flex; align-items:center; gap:6px;
  }
  .eyebrow .livedot{width:6px;height:6px;border-radius:50%;background:var(--seafoam);box-shadow:0 0 8px var(--seafoam);animation:blink 1.6s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
  h1{
    font-family:'Bricolage Grotesque', sans-serif;
    font-weight:800; font-size:23px; margin:0; letter-spacing:-0.01em;
  }
  .sub{font-size:12.5px; color:var(--sand-dim); margin-top:4px;}

  /* language switcher */
  .langswitch{
    display:flex; gap:4px; background:var(--panel); border:1px solid var(--line);
    border-radius:999px; padding:4px; backdrop-filter:blur(10px); flex-shrink:0;
  }
  .langbtn{
    width:38px; height:34px; border-radius:999px; border:none; background:transparent;
    font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    opacity:0.45; transition:all 0.2s;
  }
  .langbtn.active{ opacity:1; background:rgba(243,230,201,0.12); }

  /* geo banner */
  .geo-banner{
    position:absolute; top:78px; right:14px; z-index:950;
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:10px 12px; font-size:12px; max-width:200px; display:flex; gap:8px; align-items:flex-start;
    backdrop-filter:blur(10px); transition:opacity 0.3s, transform 0.3s;
  }
  .geo-banner.hidden{opacity:0; transform:translateY(-8px); pointer-events:none;}
  .geo-banner button{background:none;border:none;color:var(--sand-dim);cursor:pointer;font-size:14px;padding:0;margin-left:4px;}

  /* legend */
  .legend{
    position:absolute; left:16px; bottom:16px; z-index:900;
    background:var(--panel); backdrop-filter:blur(10px);
    border:1px solid var(--line);
    border-radius:14px; padding:14px 16px; width:188px;
    font-size:12.5px;
  }
  .legend h3{margin:0 0 10px; font-family:'Bricolage Grotesque',sans-serif; font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--sand-dim); font-weight:600;}
  .legend-row{display:flex; align-items:center; gap:9px; margin-bottom:7px;}
  .dot{width:11px; height:11px; border-radius:50%; flex-shrink:0;}
  .legend small{display:block; color:var(--sand-dim); margin-top:8px; line-height:1.4;}

  /* identicator marker */
  .identicator{ position:relative; width:56px; height:56px; }
  .id-glow{ position:absolute; inset:-6px; border-radius:50%; filter:blur(6px); opacity:0.55; }
  .id-sweep{ position:absolute; inset:0; border-radius:50%; border:1.5px dashed currentColor; opacity:0.5; animation:spin 6s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .id-core{
    position:absolute; inset:10px; border-radius:50%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:radial-gradient(circle at 35% 30%, rgba(255,255,255,0.35), transparent 60%);
    box-shadow: inset 0 0 10px rgba(0,0,0,0.35), 0 4px 16px rgba(0,0,0,0.45);
    border:1.5px solid rgba(255,255,255,0.55);
  }
  .id-value{ font-family:'Space Mono',monospace; font-weight:700; font-size:13px; color:#08131a; line-height:1; }
  .id-livepip{ position:absolute; top:2px; right:2px; width:9px; height:9px; border-radius:50%; background:#ff3b3b; border:2px solid rgba(255,255,255,0.6); animation:blink 1.4s infinite; }
  .id-ping{ position:absolute; inset:6px; border-radius:50%; animation:ping 2.4s cubic-bezier(0,0.6,0.4,1) infinite; }
  @keyframes ping{ 0%{ transform:scale(0.85); opacity:0.6; } 100%{ transform:scale(1.9); opacity:0; } }

  .user-dot{ width:18px; height:18px; border-radius:50%; background:#4fa8ff; border:3px solid white; box-shadow:0 0 0 6px rgba(79,168,255,0.25), 0 2px 8px rgba(0,0,0,0.4); }

  /* detail overlay */
  .detail{
    position:absolute; inset:0; z-index:1200; background:var(--deep-sea);
    transform:translateY(100%); transition:transform 0.4s cubic-bezier(.2,.8,.2,1);
    display:flex; flex-direction:column;
  }
  .detail.open{ transform:translateY(0); }
  .detail-header{
    padding:16px 18px 14px; border-bottom:1px solid var(--line);
    display:flex; align-items:flex-start; gap:12px;
    background:linear-gradient(180deg, rgba(15,58,77,0.6), transparent);
  }
  .back-btn{
    width:34px; height:34px; border-radius:10px; border:1px solid var(--line); background:rgba(243,230,201,0.06);
    color:var(--sand); font-size:16px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  }
  .detail-title{ flex:1; }
  .detail-title h2{ font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:18px; margin:0 0 2px; }
  .detail-title .meta{ font-size:12px; color:var(--sand-dim); display:flex; align-items:center; gap:6px; }

  .stat-row{ display:flex; gap:8px; padding:12px 18px; border-bottom:1px solid var(--line); }
  .stat-card{ flex:1; background:rgba(243,230,201,0.05); border:1px solid var(--line); border-radius:12px; padding:10px 12px; }
  .stat-card .label{ font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--sand-dim); margin-bottom:4px; }
  .stat-card .val{ font-family:'Space Mono',monospace; font-weight:700; font-size:15px; }

  #detailMap{ flex:1; min-height:0; position:relative; }
  .heat-legend{
    position:absolute; bottom:14px; left:14px; z-index:800;
    background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:8px 10px;
    font-size:10.5px; display:flex; align-items:center; gap:6px;
  }
  .heat-gradient{ width:70px; height:6px; border-radius:4px; background:linear-gradient(90deg, #0d3b4f, #4fd1a5 35%, #ffb648 65%, #ff3b3b 100%); }

  .leaflet-control-attribution{ display:none; }
</style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <div class="titleblock">
    <p class="eyebrow"><span class="livedot"></span><span data-i18n="eyebrow"></span></p>
    <h1 data-i18n="title"></h1>
    <p class="sub" data-i18n="subtitle"></p>
  </div>
  <div class="langswitch">
    <button class="langbtn" data-lang="ka">🇬🇪</button>
    <button class="langbtn" data-lang="en">🇬🇧</button>
  </div>
</div>

<div class="geo-banner hidden" id="geoBanner">
  <span>📍</span>
  <span id="geoText"></span>
  <button id="geoDismiss">✕</button>
</div>

<div class="legend">
  <h3 data-i18n="legendTitle"></h3>
  <div class="legend-row"><span class="dot" style="background:#4fd1a5"></span> <span data-i18n="legendQuiet"></span></div>
  <div class="legend-row"><span class="dot" style="background:#ffb648"></span> <span data-i18n="legendModerate"></span></div>
  <div class="legend-row"><span class="dot" style="background:#ff6b4a"></span> <span data-i18n="legendPacked"></span></div>
  <small data-i18n="legendNote"></small>
</div>

<div class="detail" id="detail">
  <div class="detail-header">
    <button class="back-btn" id="backBtn">←</button>
    <div class="detail-title">
      <h2 id="dName">—</h2>
      <div class="meta"><span class="livedot" style="background:#ff3b3b;box-shadow:0 0 8px #ff3b3b;"></span><span id="dMeta">—</span></div>
    </div>
  </div>
  <div class="stat-row">
    <div class="stat-card">
      <div class="label" data-i18n="statCrowd"></div>
      <div class="val" id="dPct">—</div>
    </div>
    <div class="stat-card">
      <div class="label" data-i18n="statSlot"></div>
      <div class="val" id="dSlot">—</div>
    </div>
  </div>
  <div id="detailMap">
    <div class="heat-legend"><span data-i18n="heatLow"></span><span class="heat-gradient"></span><span data-i18n="heatHigh"></span></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<script>
/* ============ I18N ============ */
const i18n = {
  eyebrow:      { ka:'აჭარის სანაპირო · ცოცხალი რეჟიმი', en:'Adjara Coastline · Live' },
  title:        { ka:'რამდენად გადატვირთულია პლაჟი?',    en:'How crowded is the beach?' },
  subtitle:     { ka:'შეეხეთ ინდიკატორს — ნახეთ რეალურ დროში სიმჭიდროვის რუკა', en:'Tap an indicator to open the real-time density map' },
  legendTitle:  { ka:'დატვირთულობის დონე', en:'Crowd level' },
  legendQuiet:  { ka:'წყნარი', en:'Quiet' },
  legendModerate:{ ka:'საშუალო', en:'Moderate' },
  legendPacked: { ka:'გადატვირთული', en:'Packed' },
  legendNote:   { ka:'რგოლის ზომა ასახავს დღევანდელ დატვირთულობას. დონე იცვლება საათობრივად.', en:'Ring size reflects today\u2019s crowd level. Updates hourly.' },
  statCrowd:    { ka:'დატვირთულობა', en:'Crowd' },
  statSlot:     { ka:'დროის შუალედი', en:'Time slot' },
  heatLow:      { ka:'დაბალი', en:'Low' },
  heatHigh:     { ka:'მაღალი', en:'High' },
  geoLocating:  { ka:'თქვენი მდებარეობის ძიება…', en:'Locating you…' },
  geoFound:     { ka:'თქვენი მდებარეობა ჩანს რუკაზე', en:'Showing your location on the map' },
  geoDenied:    { ka:'წვდომა უარყოფილია — ჩანს მთელი სანაპირო', en:'Location denied — showing full coastline' },
  geoUnsupported:{ ka:'მდებარეობა არ არის ხელმისაწვდომი', en:'Location not supported on this device' },
};
let currentLang = 'ka';

function t(key){ return i18n[key][currentLang]; }

function applyStaticTranslations(){
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('.langbtn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
}

document.querySelectorAll('.langbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentLang = btn.dataset.lang;
    applyStaticTranslations();
    refreshAllMarkers();
    if(activeZoneId) openDetail(activeZoneId, true);
  });
});

/* ============ LEVEL LABELS ============ */
const levelLabels = {
  low:      { ka:'დაბალი',            en:'Low' },
  empty:    { ka:'ცარიელი',           en:'Empty' },
  veryLow:  { ka:'ძალიან დაბალი',     en:'Very low' },
  moderate: { ka:'საშუალო',           en:'Moderate' },
  busy:     { ka:'დატვირთული',        en:'Busy' },
  packed:   { ka:'გადატვირთული',      en:'Packed' },
  veryBusy: { ka:'ძალიან დატვირთული', en:'Very busy' },
};

/* Tbilisi-time schedule: 9 daily brackets, shared shape, tier-specific intensity */
const schedule = [
  { start:0,  end:2,  key:'low' },
  { start:2,  end:6,  key:'empty' },
  { start:6,  end:8,  key:'veryLow' },
  { start:8,  end:10, key:'moderate' },
  { start:10, end:12, key:'busy' },
  { start:12, end:18, key:'packed' },
  { start:18, end:20, key:'veryBusy' },
  { start:20, end:22, key:'veryBusy' },
  { start:22, end:24, key:'moderate' },
];

const tierPct = {
  high:   [25, 5, 15, 45, 62, 88, 95, 90, 40],
  medium: [18, 4, 10, 30, 42, 60, 65, 60, 28],
  low:    [10, 2,  6, 16, 22, 32, 35, 30, 14],
};

function tbilisiHour(){
  const str = new Intl.DateTimeFormat('en-US', { timeZone:'Asia/Tbilisi', hour:'2-digit', hourCycle:'h23' }).format(new Date());
  return parseInt(str, 10);
}

function bracketIndex(hour){
  return schedule.findIndex(b => hour >= b.start && hour < b.end);
}

function currentLevelFor(tier){
  const hour = tbilisiHour();
  const idx = bracketIndex(hour);
  const bracket = schedule[idx];
  const pct = tierPct[tier][idx];
  return { pct, labelKey: bracket.key, bracket, idx };
}

function levelColor(pct){
  return pct >= 65 ? '#ff6b4a' : pct >= 35 ? '#ffb648' : '#4fd1a5';
}

/* ============ ZONES ============ */
/*
  Coordinates below come from real place lookups (Google Places), not guesses.
  Each zone also carries a `shape`: an array of [lat,lng] vertices tracing that
  beach's coastline (south → north), used to place the heatmap along the actual
  curve of the shore instead of a single straight axis. Where I only had one
  verified point for a beach, I built a gentle curve around it using the local
  coastline bearing — still an approximation, but shaped like a shoreline
  rather than a blob. For pixel-perfect accuracy, swap `shape` for a traced
  GeoJSON coastline path per beach.
*/
const zones = [
  { id:'batumi-boulevard', nameKa:'ბათუმის ბულვარის პლაჟი', nameEn:'Batumi Boulevard Beach', cityKa:'ბათუმი', cityEn:'Batumi',
    lat:41.6508, lng:41.6318, tier:'high',
    // South → north curved boulevard shoreline. The denser vertices keep the
    // heat trace visually attached to the coast instead of a straight blob.
    shape:[[41.6384,41.6062],[41.6404,41.6114],[41.6427,41.6178],[41.6450,41.6235],[41.6467,41.6284],[41.6487,41.6310],[41.6508,41.6318],[41.6528,41.6350],[41.6551,41.6385],[41.6574,41.6405],[41.6596,41.6417]] },
  { id:'batumi-old-town',  nameKa:'ძველი ქალაქის პლაჟი',    nameEn:'Old Town Beach',          cityKa:'ბათუმი', cityEn:'Batumi',
    lat:41.6465, lng:41.6505, tier:'medium',
    shape:[[41.6430,41.6470],[41.6465,41.6505],[41.6495,41.6530]] },
  { id:'batumi-north',     nameKa:'ბათუმის ჩრდილოეთი (თამარი)', nameEn:'Batumi North (Tamari)', cityKa:'ბათუმი', cityEn:'Batumi',
    lat:41.6750, lng:41.6320, tier:'medium',
    shape:[[41.6700,41.6300],[41.6750,41.6320],[41.6800,41.6345]] },
  { id:'gonio',            nameKa:'გონიოს პლაჟი',           nameEn:'Gonio Beach',             cityKa:'გონიო',  cityEn:'Gonio',
    lat:41.5672, lng:41.5656, tier:'low',
    shape:[[41.5590,41.5610],[41.5672,41.5656],[41.5750,41.5700]] },
  { id:'kobuleti-central', nameKa:'ქობულეთის ცენტრალური პლაჟი', nameEn:'Kobuleti Central Beach', cityKa:'ქობულეთი', cityEn:'Kobuleti',
    lat:41.8410, lng:41.7764, tier:'high',
    shape:[[41.8320,41.7740],[41.8365,41.7752],[41.8410,41.7764],[41.8460,41.7778],[41.8510,41.7795]] },
  { id:'kobuleti-north',   nameKa:'ქობულეთის ჩრდილოეთი',    nameEn:'Kobuleti North',          cityKa:'ქობულეთი', cityEn:'Kobuleti',
    lat:41.8620, lng:41.7818, tier:'low',
    shape:[[41.8560,41.7800],[41.8620,41.7818],[41.8680,41.7838]] },
  { id:'ureki',            nameKa:'ურეკის პლაჟი',           nameEn:'Ureki Beach',             cityKa:'ურეკი',  cityEn:'Ureki',
    lat:41.9871, lng:41.7592, tier:'low',
    shape:[[41.9800,41.7565],[41.9871,41.7592],[41.9940,41.7620]] },
];

/* ============ MAIN MAP ============ */
const map = L.map('map', { zoomControl:false, attributionControl:false }).setView([41.75, 41.70], 10.3);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom:19, subdomains:'abcd' }).addTo(map);
L.control.zoom({ position:'bottomright' }).addTo(map);

function indicatorSize(level){
  return Math.round(46 + Math.min(level.pct, 100) * 0.16);
}

function indicatorHtml(zone, level, size){
  const color = levelColor(level.pct);
  return `
    <div class="identicator" style="width:${size}px;height:${size}px;color:${color};">
      <div class="id-glow" style="background:${color};"></div>
      <div class="id-ping" style="background:${color};"></div>
      <div class="id-sweep"></div>
      <div class="id-core" style="background:${color};">
        <div class="id-value">${level.pct}%</div>
      </div>
      <div class="id-livepip"></div>
    </div>`;
}

function buildIcon(zone, level){
  const size = indicatorSize(level);
  // extra margin so the outer glow (inset:-6px) and pip aren't clipped by the icon box
  const box = size + 16;
  return L.divIcon({
    html: `<div style="width:${box}px;height:${box}px;display:flex;align-items:center;justify-content:center;">${indicatorHtml(zone, level, size)}</div>`,
    className:'',
    iconSize:[box, box],
    iconAnchor:[box/2, box/2]
  });
}

const markers = {};
zones.forEach(z => {
  const level = currentLevelFor(z.tier);
  const anchor = getZoneAnchor(z);
  // Indicators sit on the traced shore rather than on a separate, hand-placed point.
  const m = L.marker([anchor.lat, anchor.lng], { icon: buildIcon(z, level) }).addTo(map);
  m.on('click', () => openDetail(z.id));
  markers[z.id] = m;
});

function refreshAllMarkers(){
  zones.forEach(z => {
    const level = currentLevelFor(z.tier);
    markers[z.id].setIcon(buildIcon(z, level));
  });
}
setInterval(refreshAllMarkers, 60000); // check every minute, changes land on the hour

/* ============ GEOLOCATION ============ */
const geoBanner = document.getElementById('geoBanner');
const geoText = document.getElementById('geoText');
document.getElementById('geoDismiss').onclick = () => geoBanner.classList.add('hidden');

function requestLocation(){
  if(!navigator.geolocation){
    geoText.textContent = t('geoUnsupported');
    geoBanner.classList.remove('hidden');
    return;
  }
  geoText.textContent = t('geoLocating');
  geoBanner.classList.remove('hidden');
  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude, longitude } = pos.coords;
      const userIcon = L.divIcon({ html:'<div class="user-dot"></div>', className:'', iconSize:[18,18] });
      L.marker([latitude, longitude], { icon:userIcon, zIndexOffset:1000 }).addTo(map);
      geoText.textContent = t('geoFound');
      setTimeout(() => geoBanner.classList.add('hidden'), 2500);
    },
    () => {
      geoText.textContent = t('geoDenied');
      setTimeout(() => geoBanner.classList.add('hidden'), 3000);
    },
    { enableHighAccuracy:true, timeout:8000 }
  );
}
window.addEventListener('load', () => setTimeout(requestLocation, 500));

/* ============ DETAIL OVERLAY + COASTLINE HEATMAP ============ */
let detailMapInstance = null;
let heatLayer = null;
let detailAnchorMarker = null;
let activeZoneId = null;

/*
  Walks along zone.shape (a real multi-point coastline polyline) and drops
  heat points near that line, offset slightly toward land so nothing lands
  in the sea. A soft cluster bias pulls more points toward the middle of the
  shape to simulate a natural hot spot near the busiest part of the beach.
*/
function catmullRom(p0, p1, p2, p3, t){
  const t2 = t * t;
  const t3 = t2 * t;
  return [0, 1].map(i => 0.5 * (
    (2 * p1[i]) +
    (-p0[i] + p2[i]) * t +
    (2 * p0[i] - 5 * p1[i] + 4 * p2[i] - p3[i]) * t2 +
    (-p0[i] + 3 * p1[i] - 3 * p2[i] + p3[i]) * t3
  ));
}

function smoothCoastPoint(shape, progress){
  const segments = shape.length - 1;
  const scaled = Math.min(Math.max(progress, 0), 1) * segments;
  const index = Math.min(Math.floor(scaled), segments - 1);
  const localT = scaled - index;
  const point = catmullRom(
    shape[Math.max(0, index - 1)],
    shape[index],
    shape[index + 1],
    shape[Math.min(shape.length - 1, index + 2)],
    localT
  );
  const nextProgress = Math.min(progress + 0.002, 1);
  const nextScaled = nextProgress * segments;
  const nextIndex = Math.min(Math.floor(nextScaled), segments - 1);
  const next = catmullRom(
    shape[Math.max(0, nextIndex - 1)],
    shape[nextIndex],
    shape[Math.min(shape.length - 1, nextIndex + 1)],
    shape[Math.min(shape.length - 1, nextIndex + 2)],
    nextScaled - nextIndex
  );
  const tangentLat = next[0] - point[0];
  const tangentLng = next[1] - point[1];
  return { lat:point[0], lng:point[1], tangentLat, tangentLng, perpLat:-tangentLng, perpLng:tangentLat };
}

function getZoneAnchor(zone){
  return smoothCoastPoint(zone.shape, 0.5);
}

function generateHeatPoints(zone, pct){
  const count = Math.round(24 + pct * 1.3);
  const pts = [];
  for(let i=0;i<count;i++){
    const raw = Math.random();
    const clusterPull = (Math.random() + Math.random() + Math.random()) / 3; // biased toward 0.5
    const t = raw * 0.4 + clusterPull * 0.6; // blend uniform spread with a mid-beach cluster
    const p = smoothCoastPoint(zone.shape, Math.min(Math.max(t, 0), 1));
    const norm = Math.hypot(p.perpLat, p.perpLng) || 1;
    const tangentNorm = Math.hypot(p.tangentLat, p.tangentLng) || 1;
    const landOffset = (0.00012 + Math.random() * 0.00045); // positive = inland, never into sea
    const alongOffset = (Math.random() - 0.5) * 0.00028;
    const intensity = 0.35 + Math.random() * 0.65;
    pts.push([
      p.lat + (p.perpLat / norm) * landOffset + (p.tangentLat / tangentNorm) * alongOffset,
      p.lng + (p.perpLng / norm) * landOffset + (p.tangentLng / tangentNorm) * alongOffset,
      intensity
    ]);
  }
  return pts;
}

function openDetail(id, refreshOnly){
  activeZoneId = id;
  const zone = zones.find(z => z.id === id);
  const anchor = getZoneAnchor(zone);
  const level = currentLevelFor(zone.tier);
  const color = levelColor(level.pct);

  document.getElementById('dName').textContent = currentLang === 'ka' ? zone.nameKa : zone.nameEn;
  document.getElementById('dMeta').textContent = currentLang === 'ka' ? zone.cityKa : zone.cityEn;
  const pctEl = document.getElementById('dPct');
  pctEl.textContent = `${levelLabels[level.labelKey][currentLang]} · ${level.pct}%`;
  pctEl.style.color = color;
  document.getElementById('dSlot').textContent =
    `${String(level.bracket.start).padStart(2,'0')}:00–${String(level.bracket.end).padStart(2,'0')}:00`;

  document.getElementById('detail').classList.add('open');

  setTimeout(() => {
    if(!detailMapInstance){
      detailMapInstance = L.map('detailMap', { zoomControl:false, attributionControl:false, minZoom:13, maxZoom:19 });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom:19, subdomains:'abcd' }).addTo(detailMapInstance);
      L.control.zoom({ position:'bottomright' }).addTo(detailMapInstance);
    }
    detailMapInstance.setView([anchor.lat, anchor.lng], 15.3);
    detailMapInstance.invalidateSize();

    if(heatLayer){ detailMapInstance.removeLayer(heatLayer); }
    // Random each time the beach is opened, but scaled to the current hourly level
    const points = generateHeatPoints(zone, level.pct);
    heatLayer = L.heatLayer(points, {
      radius: 24, blur: 20, maxZoom: 18, max: 1.0, minOpacity: 0.25,
      gradient: { 0.2:'#0d3b4f', 0.45:'#4fd1a5', 0.7:'#ffb648', 1.0:'#ff3b3b' }
    }).addTo(detailMapInstance);

    if(detailAnchorMarker){ detailMapInstance.removeLayer(detailAnchorMarker); }
    detailAnchorMarker = L.marker([anchor.lat, anchor.lng], {
      icon: L.divIcon({ html:'<div style="width:10px;height:10px;border-radius:50%;background:#fff;border:2px solid '+color+';"></div>', className:'', iconSize:[10,10] })
    }).addTo(detailMapInstance);
  }, 120);
}

document.getElementById('backBtn').onclick = () => {
  document.getElementById('detail').classList.remove('open');
};

applyStaticTranslations();
</script>
