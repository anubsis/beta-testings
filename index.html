<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coastline — Live Beach Crowd Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --deep-sea:#081d27;
    --deep-sea-2:#0f3a4d;
    --sand:#f3e6c9;
    --sand-dim:#a9b8bd;
    --coral:#ff6b4a;
    --seafoam:#4fd1a5;
    --amber:#ffb648;
    --ink:#0b1c22;
    --panel:#0e2b38f0;
    --line:rgba(243,230,201,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:'Inter',sans-serif;background:var(--deep-sea);color:var(--sand);overflow:hidden;}
  #map{position:absolute;inset:0;}
  #map .leaflet-tile-pane{filter:hue-rotate(-6deg) brightness(0.8) contrast(1.08) saturate(0.85);}

  .topbar{
    position:absolute;top:0;left:0;right:0;z-index:900;
    padding:18px 22px 30px;
    background:linear-gradient(180deg, rgba(8,29,39,0.95) 0%, rgba(8,29,39,0.5) 65%, rgba(8,29,39,0) 100%);
    pointer-events:none;
  }
  .topbar *{pointer-events:auto;}
  .eyebrow{
    font-size:11px; letter-spacing:0.18em; text-transform:uppercase;
    color:var(--seafoam); font-weight:600; margin:0 0 4px;
    display:flex; align-items:center; gap:6px;
  }
  .eyebrow .livedot{width:6px;height:6px;border-radius:50%;background:var(--seafoam);box-shadow:0 0 8px var(--seafoam);animation:blink 1.6s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
  h1{
    font-family:'Bricolage Grotesque', sans-serif;
    font-weight:800; font-size:25px; margin:0; letter-spacing:-0.01em;
  }
  .sub{font-size:12.5px; color:var(--sand-dim); margin-top:4px;}

  /* ---------- geolocation banner ---------- */
  .geo-banner{
    position:absolute; top:14px; right:14px; z-index:950;
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:10px 12px; font-size:12px; max-width:200px; display:flex; gap:8px; align-items:flex-start;
    backdrop-filter:blur(10px); transition:opacity 0.3s, transform 0.3s;
  }
  .geo-banner.hidden{opacity:0; transform:translateY(-8px); pointer-events:none;}
  .geo-banner button{background:none;border:none;color:var(--sand-dim);cursor:pointer;font-size:14px;padding:0;margin-left:4px;}
  .geo-icon{font-size:15px;}

  /* ---------- legend ---------- */
  .legend{
    position:absolute; left:16px; bottom:16px; z-index:900;
    background:var(--panel); backdrop-filter:blur(10px);
    border:1px solid var(--line);
    border-radius:14px; padding:14px 16px; width:180px;
    font-size:12.5px;
  }
  .legend h3{margin:0 0 10px; font-family:'Bricolage Grotesque',sans-serif; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--sand-dim); font-weight:600;}
  .legend-row{display:flex; align-items:center; gap:9px; margin-bottom:7px;}
  .dot{width:11px; height:11px; border-radius:50%; flex-shrink:0;}
  .legend small{display:block; color:var(--sand-dim); margin-top:8px; line-height:1.4;}

  /* ---------- identicator marker ---------- */
  .identicator{ position:relative; width:56px; height:56px; }
  .id-glow{
    position:absolute; inset:-6px; border-radius:50%;
    filter:blur(6px); opacity:0.55;
  }
  .id-sweep{
    position:absolute; inset:0; border-radius:50%;
    border:1.5px dashed currentColor; opacity:0.5;
    animation:spin 6s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .id-ring{
    position:absolute; inset:6px; border-radius:50%;
  }
  .id-core{
    position:absolute; inset:10px; border-radius:50%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:radial-gradient(circle at 35% 30%, rgba(255,255,255,0.35), transparent 60%);
    box-shadow: inset 0 0 10px rgba(0,0,0,0.35), 0 4px 16px rgba(0,0,0,0.45);
    border:1.5px solid rgba(255,255,255,0.55);
  }
  .id-value{ font-family:'Space Mono',monospace; font-weight:700; font-size:13px; color:#08131a; line-height:1; }
  .id-pct{ font-size:8px; color:#08131a; opacity:0.7; font-weight:700; }
  .id-livepip{
    position:absolute; top:-2px; right:-2px; width:10px; height:10px; border-radius:50%;
    background:#ff3b3b; border:2px solid var(--deep-sea);
    animation:blink 1.4s infinite;
  }
  .id-ping{
    position:absolute; inset:6px; border-radius:50%;
    animation:ping 2.4s cubic-bezier(0,0.6,0.4,1) infinite;
  }
  @keyframes ping{
    0%{ transform:scale(0.85); opacity:0.6; }
    100%{ transform:scale(1.9); opacity:0; }
  }

  /* user location dot */
  .user-dot{ width:18px; height:18px; border-radius:50%; background:#4fa8ff; border:3px solid white; box-shadow:0 0 0 6px rgba(79,168,255,0.25), 0 2px 8px rgba(0,0,0,0.4); }

  /* ---------- detail overlay ---------- */
  .detail{
    position:absolute; inset:0; z-index:1200;
    background:var(--deep-sea);
    transform:translateY(100%); transition:transform 0.4s cubic-bezier(.2,.8,.2,1);
    display:flex; flex-direction:column;
  }
  .detail.open{ transform:translateY(0); }
  .detail-header{
    padding:16px 18px 14px; border-bottom:1px solid var(--line);
    display:flex; align-items:flex-start; gap:12px;
    background:linear-gradient(180deg, rgba(15,58,77,0.6), transparent);
  }
  .back-btn{
    width:34px; height:34px; border-radius:10px; border:1px solid var(--line); background:rgba(243,230,201,0.06);
    color:var(--sand); font-size:16px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  }
  .detail-title{ flex:1; }
  .detail-title h2{ font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:19px; margin:0 0 2px; }
  .detail-title .meta{ font-size:12px; color:var(--sand-dim); display:flex; align-items:center; gap:6px; }

  .stat-row{ display:flex; gap:8px; padding:12px 18px; border-bottom:1px solid var(--line); }
  .stat-card{
    flex:1; background:rgba(243,230,201,0.05); border:1px solid var(--line); border-radius:12px;
    padding:10px 12px;
  }
  .stat-card .label{ font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--sand-dim); margin-bottom:4px; }
  .stat-card .val{ font-family:'Space Mono',monospace; font-weight:700; font-size:17px; }
  .stat-card .val.trend-up{ color:var(--coral); }
  .stat-card .val.trend-down{ color:var(--seafoam); }

  #detailMap{ flex:1; min-height:0; position:relative; }
  .heat-legend{
    position:absolute; bottom:14px; left:14px; z-index:800;
    background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:8px 10px;
    font-size:10.5px; display:flex; align-items:center; gap:6px;
  }
  .heat-gradient{ width:70px; height:6px; border-radius:4px;
    background:linear-gradient(90deg, #0d3b4f, #4fd1a5 35%, #ffb648 65%, #ff3b3b 100%); }

  .report-strip{
    padding:12px 18px 18px; border-top:1px solid var(--line);
    display:flex; gap:8px; background:var(--deep-sea);
  }
  .rbtn{
    flex:1; border:1px solid var(--line); background:rgba(243,230,201,0.05); color:var(--sand);
    padding:10px 6px; border-radius:10px; font-size:12px; cursor:pointer; font-family:inherit; font-weight:600;
    transition:all 0.15s;
  }
  .rbtn:hover{ background:rgba(243,230,201,0.12); transform:translateY(-1px); }

  .leaflet-control-attribution{ display:none; }
</style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <p class="eyebrow"><span class="livedot"></span>Adjara Coastline · Live</p>
  <h1>How crowded is the beach?</h1>
  <p class="sub">Tap an indicator to open real-time density map</p>
</div>

<div class="geo-banner hidden" id="geoBanner">
  <span class="geo-icon">📍</span>
  <span id="geoText">Locating you…</span>
  <button id="geoDismiss">✕</button>
</div>

<div class="legend">
  <h3>Crowd level</h3>
  <div class="legend-row"><span class="dot" style="background:#4fd1a5"></span> Quiet · &lt;40%</div>
  <div class="legend-row"><span class="dot" style="background:#ffb648"></span> Moderate · 40–70%</div>
  <div class="legend-row"><span class="dot" style="background:#ff6b4a"></span> Packed · &gt;70%</div>
  <small>Ring size = report volume. Tap a beach for its live heatmap.</small>
</div>

<!-- DETAIL OVERLAY -->
<div class="detail" id="detail">
  <div class="detail-header">
    <button class="back-btn" id="backBtn">←</button>
    <div class="detail-title">
      <h2 id="dName">—</h2>
      <div class="meta"><span class="livedot" style="background:#ff3b3b;box-shadow:0 0 8px #ff3b3b;"></span><span id="dMeta">—</span></div>
    </div>
  </div>
  <div class="stat-row">
    <div class="stat-card">
      <div class="label">Crowd</div>
      <div class="val" id="dPct">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Trend (1h)</div>
      <div class="val" id="dTrend">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Reports</div>
      <div class="val" id="dReports">—</div>
    </div>
  </div>
  <div id="detailMap">
    <div class="heat-legend"><span>Quiet</span><span class="heat-gradient"></span><span>Packed</span></div>
  </div>
  <div class="report-strip">
    <button class="rbtn" data-level="1">🟢 Report Quiet</button>
    <button class="rbtn" data-level="2">🟡 Report Moderate</button>
    <button class="rbtn" data-level="3">🔴 Report Packed</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<script>
/* ---------- DATA MODEL ----------
  beach_zones(id, name, city, lat, lng)
  crowd_reports(id, zone_id, level 1-3, source['user'|'cv'], created_at)
  Detail heatmap points would come from either clustered user reports
  (lat/lng jitter around check-in point) or a CV person-detection pipeline
  emitting (lat,lng,weight) per detected head/cluster.
------------------------------------ */
const zones = [
  { id:'batumi-boulevard', name:'Batumi Boulevard Beach', city:'Batumi', lat:41.6580, lng:41.6360, pct:82, reports:42, trend:+12 },
  { id:'batumi-old-town',  name:'Old Town Beach',          city:'Batumi', lat:41.6450, lng:41.6390, pct:55, reports:18, trend:+4 },
  { id:'batumi-north',     name:'Batumi North (Tamari)',   city:'Batumi', lat:41.6750, lng:41.6320, pct:38, reports:9,  trend:-6 },
  { id:'gonio',            name:'Gonio Beach',             city:'Gonio',  lat:41.5860, lng:41.5680, pct:21, reports:6,  trend:-2 },
  { id:'kobuleti-central', name:'Kobuleti Central Beach',  city:'Kobuleti', lat:41.8180, lng:41.7770, pct:76, reports:27, trend:+9 },
  { id:'kobuleti-north',   name:'Kobuleti North',          city:'Kobuleti', lat:41.8420, lng:41.7860, pct:18, reports:5,  trend:0 },
  { id:'ureki',            name:'Ureki Beach',             city:'Ureki',  lat:41.9450, lng:41.7920, pct:47, reports:13, trend:+3 },
];

function levelOf(pct){ return pct >= 70 ? 3 : pct >= 40 ? 2 : 1; }
const levelStyle = {
  1:{ color:'#4fd1a5', label:'Quiet' },
  2:{ color:'#ffb648', label:'Moderate' },
  3:{ color:'#ff6b4a', label:'Packed' },
};

/* ---------- main map ---------- */
const map = L.map('map', { zoomControl:false, attributionControl:false }).setView([41.75, 41.70], 10.3);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom:19, subdomains:'abcd' }).addTo(map);
L.control.zoom({ position:'bottomright' }).addTo(map);

function indicatorHtml(zone){
  const lvl = levelOf(zone.pct);
  const s = levelStyle[lvl];
  const size = 44 + Math.min(zone.reports, 40) * 0.4;
  return `
    <div class="identicator" style="width:${size}px;height:${size}px;color:${s.color};">
      <div class="id-glow" style="background:${s.color};"></div>
      <div class="id-ping" style="background:${s.color};"></div>
      <div class="id-sweep"></div>
      <div class="id-core" style="background:${s.color};">
        <div class="id-value">${zone.pct}%</div>
        <div class="id-pct">${s.label.toUpperCase()}</div>
      </div>
      <div class="id-livepip"></div>
    </div>`;
}

const markers = {};
zones.forEach(z => {
  const icon = L.divIcon({ html: indicatorHtml(z), className:'', iconSize:[0,0] });
  const m = L.marker([z.lat, z.lng], { icon }).addTo(map);
  m.on('click', () => openDetail(z.id));
  markers[z.id] = m;
});

/* ---------- geolocation ---------- */
const geoBanner = document.getElementById('geoBanner');
const geoText = document.getElementById('geoText');
document.getElementById('geoDismiss').onclick = () => geoBanner.classList.add('hidden');

function requestLocation(){
  if(!navigator.geolocation){
    geoText.textContent = 'Location not supported on this device';
    geoBanner.classList.remove('hidden');
    return;
  }
  geoBanner.classList.remove('hidden');
  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude, longitude } = pos.coords;
      const userIcon = L.divIcon({ html:'<div class="user-dot"></div>', className:'', iconSize:[18,18] });
      L.marker([latitude, longitude], { icon:userIcon, zIndexOffset:1000 }).addTo(map);
      geoText.textContent = 'Showing your location on the map';
      setTimeout(() => geoBanner.classList.add('hidden'), 2500);
    },
    err => {
      geoText.textContent = 'Location access denied — showing full coastline';
      setTimeout(() => geoBanner.classList.add('hidden'), 3000);
    },
    { enableHighAccuracy:true, timeout:8000 }
  );
}
window.addEventListener('load', () => setTimeout(requestLocation, 500));

/* ---------- detail overlay + heatmap ---------- */
let detailMapInstance = null;
let heatLayer = null;
let activeZoneId = null;

function generateHeatPoints(zone){
  const lvl = levelOf(zone.pct);
  const count = lvl === 3 ? 130 : lvl === 2 ? 75 : 32;
  const pts = [];
  for(let i=0;i<count;i++){
    const alongShore = (Math.random()-0.5) * 0.01;   // spread along coastline
    const acrossBeach = (Math.random()-0.5) * 0.0025; // spread across beach width
    const clusterPull = Math.random() < 0.45 ? (Math.random()-0.5)*0.003 : 0; // cluster near hot spot
    const intensity = 0.35 + Math.random()*0.65;
    pts.push([zone.lat + alongShore + clusterPull, zone.lng + acrossBeach, intensity]);
  }
  return pts;
}

function openDetail(id){
  activeZoneId = id;
  const zone = zones.find(z => z.id === id);
  const lvl = levelOf(zone.pct);
  const s = levelStyle[lvl];

  document.getElementById('dName').textContent = zone.name;
  document.getElementById('dMeta').textContent = `${zone.city} · updated moments ago`;
  const pctEl = document.getElementById('dPct');
  pctEl.textContent = zone.pct + '%';
  pctEl.style.color = s.color;
  const trendEl = document.getElementById('dTrend');
  trendEl.textContent = (zone.trend > 0 ? '+' : '') + zone.trend + '%';
  trendEl.className = 'val ' + (zone.trend > 0 ? 'trend-up' : zone.trend < 0 ? 'trend-down' : '');
  document.getElementById('dReports').textContent = zone.reports;

  document.getElementById('detail').classList.add('open');

  setTimeout(() => {
    if(!detailMapInstance){
      detailMapInstance = L.map('detailMap', { zoomControl:false, attributionControl:false });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom:19, subdomains:'abcd' }).addTo(detailMapInstance);
      L.control.zoom({ position:'bottomright' }).addTo(detailMapInstance);
    }
    detailMapInstance.setView([zone.lat, zone.lng], 15.3);
    detailMapInstance.invalidateSize();

    if(heatLayer){ detailMapInstance.removeLayer(heatLayer); }
    const points = generateHeatPoints(zone);
    heatLayer = L.heatLayer(points, {
      radius: 32, blur: 28, maxZoom: 17,
      gradient: { 0.2:'#0d3b4f', 0.45:'#4fd1a5', 0.7:'#ffb648', 1.0:'#ff3b3b' }
    }).addTo(detailMapInstance);

    L.marker([zone.lat, zone.lng], {
      icon: L.divIcon({ html:'<div style="width:10px;height:10px;border-radius:50%;background:#fff;border:2px solid '+s.color+';"></div>', className:'', iconSize:[10,10] })
    }).addTo(detailMapInstance);
  }, 120);
}

document.getElementById('backBtn').onclick = () => {
  document.getElementById('detail').classList.remove('open');
};

document.querySelectorAll('.rbtn').forEach(btn => {
  btn.onclick = () => {
    if(!activeZoneId) return;
    const zone = zones.find(z => z.id === activeZoneId);
    const lvl = parseInt(btn.dataset.level);
    zone.pct = lvl === 1 ? 25 : lvl === 2 ? 55 : 85;
    zone.reports += 1;
    markers[zone.id].setIcon(L.divIcon({ html: indicatorHtml(zone), className:'', iconSize:[0,0] }));
    openDetail(zone.id);
  };
});
</script>
</body>
</html>
